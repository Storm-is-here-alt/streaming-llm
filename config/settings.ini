# StormLLM Configuration File
# Streaming Tensor Loader with Deterministic Memory Pressure

[model]
# location = /path/to/your/model.gguf
# Leave empty for demo mode
location =

[stream]
stream_tensors = true
#how many tensors in RAM at any given moment
tensor_RAM = 2
#how many tensors to keep ready for flight and sleep once fetched til first tensor in RAM is processed and evicted 
tensor_prefetch = 2

stream_mb = false
size_mb = 64
Prefetch = 5
Memory = 6

[bridge]
#bridge between CPU and transformer file was described above
file = /tmp/storm/storm.bin 

[server]
enabled = false
port = 8080
URL = 127.0.0.1

[tools]
privileges = ask #ask or allow
filesystem = /tmp/storm/work

[debug]
verbose = true  #Heavy verbose Debug
